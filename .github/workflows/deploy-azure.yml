name: Build and deploy PRISM to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_VAPI_KEY: ${{ secrets.NEXT_PUBLIC_VAPI_KEY }}
          NEXT_PUBLIC_VAPI_ASSISTANT_ID: ${{ secrets.NEXT_PUBLIC_VAPI_ASSISTANT_ID }}

      - name: Create deployment package
        run: |
          mkdir deploy
          cp -r .next deploy/
          cp -r node_modules deploy/
          cp -r public deploy/ 2>/dev/null || true
          cp package.json deploy/
          cp package-lock.json deploy/
          cp next.config.js deploy/
          cd deploy
          zip -r ../deploy.zip .

      - name: Extract publish profile credentials
        id: creds
        run: |
          echo "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" > profile.xml
          USERNAME=$(grep -o 'userName="[^"]*"' profile.xml | head -1 | sed 's/userName="//;s/"//')
          PASSWORD=$(grep -o 'userPWD="[^"]*"' profile.xml | head -1 | sed 's/userPWD="//;s/"//')
          echo "::add-mask::$PASSWORD"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          rm profile.xml

      - name: Clear old files on Azure
        run: |
          curl -s -X DELETE \
            "https://${{ secrets.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/vfs/site/wwwroot/?recursive=true" \
            -u "${{ steps.creds.outputs.username }}:${{ steps.creds.outputs.password }}"

      - name: Deploy directly to wwwroot
        run: |
          curl -X PUT \
            "https://${{ secrets.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/zip/site/wwwroot/" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/zip" \
            -u "${{ steps.creds.outputs.username }}:${{ steps.creds.outputs.password }}" \
            --max-time 300 \
            -v
